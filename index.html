<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:
radial-gradient(circle at top,#8a2be2,#30004d 60%,#120021);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.5;
}

.card{
position:relative;
width:90%;
max-width:600px;
padding:35px;
text-align:center;
border:3px solid #ff7df7;
border-radius:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:
0 0 25px #ff4df8,
0 0 60px #8a2be2;
}

h1{
font-size:26px;
color:#ffd1ff;
margin-bottom:10px;
}

h2{
font-size:20px;
color:#ffffff;
margin-bottom:15px;
}

.imagen-cumple{
margin-bottom:25px;
}

.imagen-cumple img{
width:100%;
max-width:420px;
border-radius:25px;
box-shadow:
0 0 20px #ff4df8,
0 0 40px #8a2be2;
}

#countdown{
font-size:18px;
font-weight:bold;
color:#fff;
line-height:1.6;
}

.hearts{
font-size:22px;
margin-top:20px;
animation:flotar 2s infinite alternate;
}

@keyframes flotar{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}
</style>
