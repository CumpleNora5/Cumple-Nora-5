<body>

<div class="stars"></div>

<div class="card">

<h1>✨ Próximamente... ✨</h1>

<h2>🎂 5º Cumpleaños de Nora 🎂</h2>

<div class="imagen-cumple">
    <img src="foto.png" alt="Cumpleaños de Nora">
</div>

<div id="countdown"></div>

<!-- 🎵 BOTÓN DE MÚSICA -->
<button id="musicBtn" onclick="toggleMusic()">
🎵 Reproducir música
</button>

<div class="hearts">
💖 ⭐ 💜 ⭐ 💖
</div>

</div>

<!-- 🎶 AUDIO -->
<audio id="musica" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script>

const fechaEvento = new Date("2026-08-04T16:00:00");

function actualizarCuenta(){
const ahora = new Date();
const diferencia = fechaEvento - ahora;

const dias = Math.floor(diferencia / (1000*60*60*24));
const horas = Math.floor((diferencia / (1000*60*60)) % 24);
const minutos = Math.floor((diferencia / (1000*60)) % 60);
const segundos = Math.floor((diferencia / 1000) % 60);

document.getElementById("countdown").innerHTML =
`${dias} días<br>${horas} horas<br>${minutos} minutos<br>${segundos} segundos`;
}

setInterval(actualizarCuenta,1000);
actualizarCuenta();

/* 🎵 CONTROL DE MÚSICA */
let reproduciendo = false;

function toggleMusic(){
const musica = document.getElementById("musica");
const btn = document.getElementById("musicBtn");

if(!reproduciendo){
musica.play();
btn.innerHTML = "⏸️ Pausar música";
reproduciendo = true;
} else {
musica.pause();
btn.innerHTML = "🎵 Reproducir música";
reproduciendo = false;
}
}

</script>

</body>
