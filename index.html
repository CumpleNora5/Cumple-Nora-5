<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5º Cumpleaños de Nora</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:
radial-gradient(circle at top,#8a2be2,#30004d 60%,#120021);

min-height:100svh;
display:flex;
justify-content:center;
align-items:center;

color:white;
padding:20px;
overflow-x:hidden;
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.5;
z-index:0;
}

.card{
position:relative;
z-index:1;

width:90%;
max-width:600px;
padding:35px;

text-align:center;

border:3px solid #ff7df7;
border-radius:40px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);

box-shadow:
0 0 25px #ff4df8,
0 0 60px #8a2be2;
}

h1{
font-size:26px;
color:#ffd1ff;
margin-bottom:10px;
}

h2{
font-size:20px;
color:#ffffff;
margin-bottom:15px;
}

.imagen-cumple{
margin-bottom:25px;
}

.imagen-cumple img{
width:100%;
max-width:420px;
border-radius:25px;

box-shadow:
0 0 20px #ff4df8,
0 0 40px #8a2be2;
}

#countdown{
font-size:18px;
font-weight:bold;
color:white;
line-height:1.6;
margin-top:10px;
}

#musicBtn{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
cursor:pointer;

font-size:16px;
font-weight:bold;

color:white;

background:linear-gradient(45deg,#ff4df8,#8a2be2);

box-shadow:
0 0 10px #ff4df8,
0 0 20px #ff4df8,
0 0 40px #8a2be2;

animation:glow 1.5s infinite alternate;
}

#musicBtn:hover{
transform:scale(1.05);
}

@keyframes glow{
from{
box-shadow:
0 0 10px #ff4df8,
0 0 20px #ff4df8;
}
to{
box-shadow:
0 0 20px #ff4df8,
0 0 40px #ff4df8,
0 0 60px #8a2be2;
}
}

.hearts{
font-size:22px;
margin-top:20px;
animation:flotar 2s infinite alternate;
}

@keyframes flotar{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="card">

<h1>✨ Próximamente... ✨</h1>

<h2>🎂 5º Cumpleaños de Nora 🎂</h2>

<div class="imagen-cumple">
<img src="foto.png" alt="Cumpleaños de Nora">
</div>

<div id="countdown"></div>

<button id="musicBtn" onclick="toggleMusic()">
🎵 Reproducir música
</button>

<div class="hearts">
💖 ⭐ 💜 ⭐ 💖
</div>

</div>

<audio id="musica" loop>
<source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

const fechaEvento = new Date("2026-08-04T16:00:00");

function actualizarCuenta(){

const ahora = new Date();
const diferencia = fechaEvento - ahora;

const dias = Math.floor(diferencia / (1000*60*60*24));
const horas = Math.floor((diferencia / (1000*60*60)) % 24);
const minutos = Math.floor((diferencia / (1000*60)) % 60);
const segundos = Math.floor((diferencia / 1000) % 60);

document.getElementById("countdown").innerHTML =
`${dias} días<br>${horas} horas<br>${minutos} minutos<br>${segundos} segundos`;

}

setInterval(actualizarCuenta,1000);
actualizarCuenta();

let reproduciendo = false;

function toggleMusic(){

const musica = document.getElementById("musica");
const btn = document.getElementById("musicBtn");

if(!reproduciendo){

musica.play();

btn.innerHTML = "⏸️ Pausar música";

reproduciendo = true;

}else{

musica.pause();

btn.innerHTML = "🎵 Reproducir música";

reproduciendo = false;

}

}

</script>

</body>
</html>
