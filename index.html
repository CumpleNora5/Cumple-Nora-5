<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5º Cumpleaños de Nora</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:
radial-gradient(circle at top,#8a2be2,#30004d 60%,#120021);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.5;
}

.card{
position:relative;
width:90%;
max-width:600px;
padding:40px;
text-align:center;
border:3px solid #ff7df7;
border-radius:40px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
box-shadow:
0 0 25px #ff4df8,
0 0 60px #8a2be2;
}

h1{
font-size:40px;
color:#ffd1ff;
margin-bottom:15px;
}

h2{
font-size:32px;
color:#ffffff;
margin-bottom:20px;
}

.imagen-cumple{
margin-bottom:30px;
}

.imagen-cumple img{
width:100%;
max-width:500px;
border-radius:25px;
box-shadow:
0 0 20px #ff4df8,
0 0 40px #8a2be2;
}

#countdown{
font-size:30px;
font-weight:bold;
color:#fff;
line-height:1.5;
}

.hearts{
font-size:30px;
margin-top:25px;
animation:flotar 2s infinite alternate;
}

@keyframes flotar{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="card">
<h1>✨ Próximamente... ✨</h1>

<h2>🎂 5º Cumpleaños de Nora 🎂</h2>

<div class="imagen-cumple">
    <img src="IMG_20260615_134835.png" alt="Cumpleaños de Nora">
</div>

<div id="countdown"></div>

<div class="hearts">
💖 ⭐ 💜 ⭐ 💖
</div>

</div>

<script>

const fechaEvento = new Date("2026-08-04T16:00:00");

function actualizarCuenta(){

const ahora = new Date();
const diferencia = fechaEvento - ahora;

const dias = Math.floor(diferencia / (1000*60*60*24));
const horas = Math.floor((diferencia / (1000*60*60)) % 24);
const minutos = Math.floor((diferencia / (1000*60)) % 60);
const segundos = Math.floor((diferencia / 1000) % 60);

document.getElementById("countdown").innerHTML =
`
${dias} días<br>
${horas} horas<br>
${minutos} minutos<br>
${segundos} segundos
`;

}

setInterval(actualizarCuenta,1000);
actualizarCuenta();

</script>

</body>
</html>
